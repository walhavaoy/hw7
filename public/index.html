<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f5f5f5;
      color: #333;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    main {
      text-align: center;
      padding: 2rem;
      max-width: 40rem;
    }
    h1 {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1.2;
      color: #222;
    }
    p {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #666;
      line-height: 1.6;
    }
    @media (max-width: 30rem) {
      h1 {
        font-size: 2rem;
      }
      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello World</h1>
    <p>A clean, minimal greeting.</p>
  </main>
</body>
</html>
