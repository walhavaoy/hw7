<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --text: #1f2937;
      --text-dim: #6b7280;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body, h1, p {
      margin: 0;
    }
    html, body {
      height: 100%;
    }
    body {
      font-family: var(--font-sans);
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }
    main {
      text-align: center;
      max-width: 40rem;
      display: grid;
      gap: 1rem;
    }
    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .subtitle {
      color: var(--text-dim);
      font-size: 1.125rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello World</h1>
    <p class="subtitle">Served with Node.js, Express, and TypeScript.</p>
  </main>
</body>
</html>
